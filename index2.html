<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Bloom - I Love You</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #02010c 10%, #000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .flower {
    position: relative;
    width: 200px;
    height: 200px;
    animation: bloom 2s ease-out forwards;
    transform: scale(0);
  }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px;
    height: 60px;
    background: #0ff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
    animation: heartbeat 1.8s ease-in-out infinite 2.2s;
  }

  .petal {
    position: absolute;
    width: 90px;
    height: 130px;
    top: 50%;
    left: 50%;
    background: linear-gradient(145deg, #00ffff, #00ff99);
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
    transform: translate(-50%, -100%) scaleY(0);
    box-shadow: 0 0 25px #0ff;
    opacity: 0.9;
    animation: openPetal 1.6s ease-out forwards;
  }

  /* Rotate petals evenly around the center */
  .petal:nth-child(2) { transform: translate(-50%, -100%) rotate(60deg) scaleY(0); animation-delay: 0.2s; }
  .petal:nth-child(3) { transform: translate(-50%, -100%) rotate(120deg) scaleY(0); animation-delay: 0.4s; }
  .petal:nth-child(4) { transform: translate(-50%, -100%) rotate(180deg) scaleY(0); animation-delay: 0.6s; }
  .petal:nth-child(5) { transform: translate(-50%, -100%) rotate(240deg) scaleY(0); animation-delay: 0.8s; }
  .petal:nth-child(6) { transform: translate(-50%, -100%) rotate(300deg) scaleY(0); animation-delay: 1s; }

  /* The petal with text */
  .petal.text {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Poppins", sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #fff;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    letter-spacing: 1px;
    animation-delay: 0s;
    opacity: 0;
  }

  /* Stem */
  .stem {
    position: absolute;
    bottom: -130px;
    left: 50%;
    width: 10px;
    height: 150px;
    background: linear-gradient(to bottom, #0ff, #009999);
    border-radius: 20px;
    transform: translateX(-50%) scaleY(0);
    box-shadow: 0 0 20px #0ff;
    animation: growStem 1.5s ease-out forwards 0.5s;
    transform-origin: top;
  }

  /* KEYFRAMES */
  @keyframes bloom {
    0% { transform: scale(0); opacity: 0; }
    80% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }

  @keyframes openPetal {
    0% { transform: translate(-50%, -100%) rotate(var(--r, 0)) scaleY(0); opacity: 0; }
    70% { transform: translate(-50%, -100%) rotate(var(--r, 0)) scaleY(1.1); opacity: 1; }
    100% { transform: translate(-50%, -100%) rotate(var(--r, 0)) scaleY(1); opacity: 1; }
  }

  @keyframes growStem {
    0% { scale: 1 0; opacity: 0; }
    100% { scale: 1 1; opacity: 1; }
  }

  @keyframes heartbeat {
    0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px #0ff, 0 0 40px #0ff; }
    30% { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 30px #0ff, 0 0 70px #0ff; }
    60% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px #0ff, 0 0 40px #0ff; }
    100% { transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>

  <div class="flower">
    <div class="center"></div>
    <div class="petal text">I love you</div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="stem"></div>
  </div>

</body>
</html>
